# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CD with Gradle

on:
  push:
    branches: [ "develop" ]

permissions:
  contents: read
  
env:
  S3_BUCKET_NAME: dallinday-bucket

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      working-directory: .

    steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Add permission
      run: chmod +x gradlew
      working-directory: ${{ env.working-directory }}
      
    - name: Build with Gradle
      run: ./gradlew clean build --debug
      working-directory: ${{ env.working-directory }}
      
      # build한 후 프로젝트를 압축합니다.
    - name: Make zip file
      run: zip -r ./dallinday-deploy.zip .
      shell: bash
    
    # Access Key와 Secret Access Key를 통해 권한을 확인.
    # Access Key와 Secret Key는 Github Secret에 등록되어 있음.
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }} 
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} 
        aws-region: ap-northeast-2
    
    # 압축한 프로젝트를 S3로 전송합니다.
    - name: Upload to S3
      run: aws s3 cp --region ap-northeast-2 ./dallinday-deploy.zip s3://$S3_BUCKET_NAME/dallinday-deploy.zip
  
  deploy:

    runs-on: ubuntu-latest
    needs: build
    
    steps:
    
      # CodeDeploy에게 배포 명령을 내립니다.
    - name: Code Deploy
      env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      run: >
        aws deploy create-deployment --application-name dallinday
        --deployment-config-name CodeDeployDefault.AllAtOnce
        --deployment-group-name dallinday-group
        --s3-location bucket=$S3_BUCKET_NAME,bundleType=zip,key=dallinday-deploy.zip
        --region ap-northeast-2
