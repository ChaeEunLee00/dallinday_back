spring:
  application:
    name: dallinday
  profiles:
    active: dev,security
  output:
    ansi:
      enabled: DETECT
  logging:
    level:
      root: INFO
      org.apache: WARN
      org.springframework.orm.jpa: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  info:
    os:
      enabled: true
    java:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true