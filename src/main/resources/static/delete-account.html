<p>본 페이지에서는 <strong> 달린데이 </strong> 계정 삭제 방법을 안내드립니다.</p>

<h2>계정 삭제 방법</h2>
<div class="highlight">
    1. 앱에 로그인 후, 설정(Settings) → "계정 삭제" 메뉴를 선택합니다.<br>
    2. 안내 메시지를 확인하고 '계정 삭제' 버튼을 누르면 삭제가 진행됩니다.<br>
    3. 계정 삭제 시 모든 개인 정보와 서비스 이용 기록이 <strong>즉시</strong> 삭제됩니다.
</div>
